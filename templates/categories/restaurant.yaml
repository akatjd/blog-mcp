name: restaurant
display_name: 맛집 리뷰
fields:
  - name: name
    label: 식당명
    type: str
    required: true
  - name: location
    label: 위치
    type: str
    required: true
    description: "국내: '역이름' 또는 '동네/인근동네', 해외: '나라/도시'"
  - name: menu
    label: 주요 메뉴
    type: str
    required: true
  - name: visited_dishes
    label: 실제로 먹은 메뉴 목록
    type: str
    required: false
    description: "본문에 등장시킬 메뉴를 명확히 나열. 사진 추측보다 이 목록을 우선함. (예: '가리비, 멍게, 대게 2마리, 매운탕+라면 사리')"
  - name: companions
    label: 동행자
    type: str
    required: false
    description: "(예: '4인, 친구들' / '아내와 둘이' / '혼밥')"
  - name: trip_motive
    label: 방문 동기
    type: str
    required: false
    description: "왜 가게 됐는지. (예: '도심 답답함 벗어나려 계획된 여행', '근처 출장 끝나고')"
  - name: visit_context
    label: 방문 맥락
    type: str
    required: false
    description: "방문 순서나 상황. (예: '1차로 모녀가리비 먹고 2차로 들어옴', '저녁 8시 도착, 웨이팅 30분')"
  - name: transport
    label: 교통수단/접근
    type: str
    required: false
    description: "(예: '택시 10분, 새벽에도 잘 잡힘' / '지하철 도보 5분' / '주차 어려움')"
  - name: opinion
    label: 솔직한 평가
    type: str
    required: false
    description: "본인의 평가/관점. 가성비 의견, 단점, 다음에 어떻게 갈지 등. (예: '스끼다시 생각하면 단품보다 낫다고 봄')"
  - name: price_range
    label: 가격대
    type: str
    required: false
  - name: rating
    label: 별점
    type: float
    required: false
    min: 0
    max: 5
  - name: extra
    label: 추가 메모
    type: str
    required: false

prompt: |
  [카테고리: 맛집 리뷰]

  기본 정보:
  - 식당명: {name}
  - 위치: {location}
  - 주요 메뉴: {menu}
  - 실제로 먹은 메뉴: {visited_dishes}
  - 동행자: {companions}
  - 방문 동기: {trip_motive}
  - 방문 맥락: {visit_context}
  - 교통/접근: {transport}
  - 솔직한 평가: {opinion}
  - 가격대: {price_range}
  - 별점: {rating}/5
  {extra_line}
  {style_section}
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  사실/추측 분리 (가장 중요한 원칙)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - "실제로 먹은 메뉴"가 채워져 있다면, 본문에 언급하는 음식은 그 목록만 사용한다.
    사진에 다른 음식처럼 보이는 게 있어도 추측해서 추가하지 말 것.
  - "방문 동기", "방문 맥락", "동행자", "교통/접근"은 채워진 그대로 본문에 녹여 쓴다.
    채워지지 않은 항목은 추측해서 만들지 말고, 그 단락 자체를 짧게 넘기거나 생략한다.
  - "솔직한 평가"가 있다면 그것을 가성비/총평 단락의 결론으로 사용한다.
    평가가 비어 있으면 사진과 메뉴 정보 안에서만 무난한 결론을 내린다.
  - 사진에서 확실하지 않은 디테일은 일반 표현으로 처리한다.
    예: "산낙지·굴" (확실하지 않음) → "조개 모듬", "해산물 사이드" (안전한 표현)
  - 인물 사진의 표정/옷차림/관계 등은 추측 금지.
  - 가격은 입력된 값만 사용. 1인당/객단가 환산은 입력에 없으면 하지 말 것.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  블로그 작성 규칙:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. 출력 형식 (절대 원칙):
     - 마크다운 문법 절대 사용 금지 (네이버 블로그는 마크다운 미지원)
     - ## 헤더, **굵은글씨**, --- 구분선, 표(|), 불릿(-/*), 인용구(>) 모두 금지
     - 일반 텍스트와 줄바꿈만 사용

  2. 분량: 1500자 이상 (공백 포함) — 체류시간 확보를 위해 충분한 분량 필수

  3. 톤/문체:
     - 30대 중반 남성, 솔직하고 담백한 후기 스타일
     - 과장 없이 친구한테 말하듯 자연스럽게
     - "~했다", "~였다" 체 사용 (블로그 일반체)
     - 맛 표현은 구체적으로 (예: "달달하면서 짭조름한", "불향이 은근히 배어있는")

  4. 이미지 캡션:
     - 사진은 네이버 블로그 에디터에서 직접 본문 사이에 삽입한다는 전제로 작성
     - [📷 ...] 같은 텍스트 캡션은 사용하지 말 것 (사용자가 매번 지움)
     - 사진이 들어갈 위치만 자연스럽게 단락 흐름으로 비워둘 것

  5. 제목 형식 (반드시 아래 형식 준수):
     - 형식: [{location}] {name} - 대표메뉴명
     - 예시: [왕십리/상왕십리] 아라참치 - 스페셜
     - 예시: [을지로3가역] 달맞이광장바베큐 - 소금바베큐
     - 예시: [일본/나고야] 야바톤 센트라이즈 점(미소카츠)
     - 국내: [역이름] 또는 [동네/인근동네] 형식
     - 해외: [나라/도시] 형식
     - 부제목, 추가 문구, 느낌표 등 넣지 말 것

  6. 키워드 전략 (DIA 점수 향상):
     - 핵심 키워드("{location} 맛집", "{name}")를 제목·도입부·중반·마무리에 자연스럽게 2~3회 반복
     - 동의어·연관어도 활용 (예: 맛집 → 맛있는 곳, 식당, 가게)
     - 키워드 억지 반복 금지 — 자연스럽게 녹여야 함

  7. 네이버 지도 장소 태그 안내:
     - 본문 마지막에 아래 문구 삽입:
       "[{name} 위치 정보는 네이버 지도에서 확인하세요]"
     - 실제 발행 시 네이버 지도 장소 태그 필수 추가 (검색 노출에 직결)

  8. 해시태그 (5~7개, 짧은 키워드형):
     - 필수: {location}맛집, {name}, {menu} 관련 태그
     - 예: #{location}맛집 #{name} #혼밥맛집 #가성비맛집

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  블로그 구조 (이 순서로 작성):
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  제목: (SEO 최적화된 제목)

  도입부 (약 200자)
    └ "방문 동기" + "방문 맥락"을 자연스럽게 섞어 풀어쓴다
    └ 둘 다 비어 있으면 짧게 (100자 이내)
    └ 핵심 키워드 자연스럽게 포함

  분위기·인테리어 (약 250자)
    └ 사진과 입력 정보로 확인 가능한 매장 외관/좌석/혼잡도
    └ 동행자 정보가 있으면 자연스럽게 언급

  메뉴 소개 및 맛 평가 (약 600자)
    └ "실제로 먹은 메뉴" 목록을 기준으로만 작성
    └ 가격은 입력된 값만 사용
    └ 사진에 보이는 추가 음식은 "조개 모듬" 같은 일반 표현으로

  가격 & 접근성 (약 200자)
    └ 입력된 가격대 + "교통/접근" 정보 그대로 사용
    └ 입력에 없는 정보는 만들지 말 것 (예: 주차장 유무를 추측 금지)

  총평 (약 150자)
    └ "솔직한 평가"가 있으면 그것을 결론으로 사용
    └ 없으면 사진/메뉴 범위 안에서 무난한 결론

  네이버 지도 장소 태그 안내 문구

  해시태그
